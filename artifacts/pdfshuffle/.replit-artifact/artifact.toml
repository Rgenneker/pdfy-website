kind = "web"
previewPath = "/"
title = "PDFShuffl"
version = "1.0.0"
id = "artifacts/pdfshuffle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23966

[services.development]
run = "pnpm --filter @workspace/pdfshuffle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdfshuffle", "run", "build" ]
publicDir = "artifacts/pdfshuffle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23966"
BASE_PATH = "/"
